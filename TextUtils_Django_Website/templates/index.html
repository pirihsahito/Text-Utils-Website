<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextUtils - Simple & Powerful</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Custom Colors */
        .bg-custom-dark {
            background-color: #2c3e50 !important;
        }

        /* Deep Slate Gray Navbar */
        .text-custom-teal {
            color: #1abc9c !important;
        }

        /* Clean Teal Brand Accent */
        .btn-custom {
            background-color: #1abc9c;
            color: white;
            border: none;
        }

        .btn-custom:hover {
            background-color: #16a085;
            color: white;
        }

        /* Matching the image structure */
        .alert-custom {
            background-color: #d1f2eb;
            color: #116f5c;
            border: none;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-custom-dark">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="/">TextUtils.in</a>
            <div class="navbar-nav me-auto">
                <a class="nav-link active" href="/">Home</a>
                <a class="nav-link" href="/about/">About Us</a>
                <a class="nav-link" href="/contact/">Contact Us</a>
            </div>
            <form class="d-flex" role="search">
                <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                <button class="btn btn-outline-light" type="submit">Search</button>
            </form>
        </div>
    </nav>

    <div class="alert alert-custom rounded-0 px-4 py-2 small" role="alert">
        <strong>Welcome to TextUtils!</strong> You can do anything with your text here!
    </div>

    <div class="container mt-4">
        <p class="text-secondary mb-3">Enter your text here and let Text Utils do the magic</p>

        <form action="/analyze/" method="post">
            {% csrf_token %}

            <div class="mb-3">
                <textarea name="text" class="form-control border-secondary-subtle shadow-sm" rows="8"
                    style="max-width: 700px;" spellcheck="false" required></textarea>
            </div>

            <div class="mb-3 ps-1">
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" name="removepunc" role="switch"
                        id="switchCheckDefault1">
                    <label class="form-check-label" for="switchCheckDefault">Remove Punctuations</label>
                </div>

                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" name="allcaps" role="switch"
                        id="switchCheckDefault2">
                    <label class="form-check-label" for="switchCheckDefault">UPPERCASE</label>
                </div>

                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" name="newlineremover" role="switch"
                        id="switchCheckDefault3">
                    <label class="form-check-label" for="switchCheckDefault">New Line Remover</label>
                </div>

                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" name="extraspaceremover" role="switch"
                        id="switchCheckDefault4">
                    <label class="form-check-label" for="switchCheckDefault">Extra Space Remover</label>
                </div>

                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" name="charcounter" role="switch"
                        id="switchCheckDefault5">
                    <label class="form-check-label" for="switchCheckDefault">Characters Counter</label>
                </div>

                <button type="submit" class="btn btn-custom px-4 py-2 fw-semibold shadow-sm">Analyze Text</button>
            </div>
        </form>

    </div>

    <!-- Footer Section -->
    <footer class="bg-custom-dark text-white-50 text-center py-3 mt-auto">
        <div class="container-fluid px-4">
            <p class="mb-0 small">&copy; 2026 TextUtils.in | Developed by Pirih Sahito</p>
        </div>
    </footer>

</body>

</html>
